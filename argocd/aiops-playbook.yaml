apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: aiops-playbook
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/AdahMilly/aiops-gitops.git
    targetRevision: main
    path: clusters/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: aiops

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
