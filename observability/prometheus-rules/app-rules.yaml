apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule

metadata:
  name: aiops-rules
  namespace: monitoring

spec:
  groups:
    - name: aiops.rules

      rules:

        - alert: ApplicationDown

          expr: up{job="aiops-playbook"} == 0

          for: 1m

          labels:
            severity: critical

          annotations:
            summary: Application is down

            description: |
              Prometheus has not scraped aiops-playbook successfully
              for more than one minute.

        - alert: HighCPUUsage

          expr: rate(container_cpu_usage_seconds_total{pod=~"aiops-playbook.*"}[5m]) > 0.8

          for: 2m

          labels:
            severity: warning

          annotations:
            summary: High CPU usage

            description: CPU usage exceeded 80%.