apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule

metadata:
  name: aiops-rules
  namespace: monitoring

spec:
  groups:
    - name: aiops.rules

      rules:

        - alert: PodRestarting

          expr: increase(kube_pod_container_status_restarts_total[5m]) > 0

          for: 2m

          labels:
            severity: warning

          annotations:
            summary: Pod restarting
            description: A pod restarted within the last 5 minutes.

        - alert: HighCPUUsage

          expr: sum(rate(container_cpu_usage_seconds_total{container!="POD"}[5m])) > 0.8

          for: 5m

          labels:
            severity: warning

          annotations:
            summary: High CPU usage
            description: CPU utilization exceeded 80%.

        - alert: HighMemoryUsage

          expr: sum(container_memory_working_set_bytes{container!="POD"}) > 1000000000

          for: 5m

          labels:
            severity: warning

          annotations:
            summary: High memory usage
            description: Memory usage exceeded the threshold.

        - alert: ApplicationUnavailable

          expr: kube_deployment_status_replicas_available{deployment="aiops-playbook"} == 0

          for: 2m

          labels:
            severity: critical

          annotations:
            summary: Application unavailable
            description: No replicas are available.