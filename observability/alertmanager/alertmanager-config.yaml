apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig

metadata:
  name: aiops-alertmanager
  namespace: monitoring

spec:

  route:
    receiver: slack
    groupBy:
      - alertname
      - severity

    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 12h

  receivers:

    - name: slack

      slackConfigs:

        - apiURL:
            name: alertmanager-slack
            key: webhook

          channel: "#alerts"

          sendResolved: true

          title: "{{ .CommonLabels.alertname }}"

          text: |
            Severity: {{ .CommonLabels.severity }}

            Summary:
            {{ .CommonAnnotations.summary }}

            Description:
            {{ .CommonAnnotations.description }}