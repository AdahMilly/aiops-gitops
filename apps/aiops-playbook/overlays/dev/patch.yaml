apiVersion: apps/v1
kind: Deployment

metadata:
  name: aiops-playbook

spec:
  replicas: 1

  template:
    spec:
      containers:
        - name: Convert owner to lowercase
          id: owner
          run: |
            echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

        - name: Update Image Tag
          run: |
            sed -i "s|image: .*|image: ghcr.io/${{ steps.owner.outputs.owner }}/aiops-gitops-playbook:${{ github.sha }}|g" \
            gitops/apps/aiops-playbook/overlays/dev/patch.yaml
